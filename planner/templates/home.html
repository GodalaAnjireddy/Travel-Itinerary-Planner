<!DOCTYPE html>
<html>
<head>
    <title>AI Travel Planner</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        .box {
            margin-top: 50px;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
        }
        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }
        .result {
            margin-top: 30px;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🤖 AI Travel Planner</h1>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="city" placeholder="Enter city" required><br>
        <input type="number" name="days" placeholder="Days" required><br>
        <input type="text" name="budget" placeholder="Budget" required><br>
        <button type="submit">Generate Plan</button>
    </form>

    {% if itinerary %}
    <div class="result">
        <h3>Your AI Plan:</h3>
        <p>{{ itinerary }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
